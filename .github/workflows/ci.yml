name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      # Chromium for the browser-driven E2E (matches the installed playwright-core).
      - name: Install Chromium
        run: npx --yes playwright-core@1.61.0 install --with-deps chromium-headless-shell

      - name: E2E (preview flow, mocked — no AI keys needed)
        run: npm run test:e2e
